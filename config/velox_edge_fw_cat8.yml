# Velox baseline + only Category 8 temporal position features (full-window mode)
# All other categories disabled — isolates temporal position signal.
# Inherits: velox_edge_engineered → velox → orthrus_non_snooped → orthrus → default

_include_yml: velox_edge_engineered

edge_engineering:
  mode: "full_window"
  before_fusion: True
  category_1_pair: False
  category_2_source: False
  category_3_type: False
  category_4_pair_type: False
  category_5_source_type: False
  category_6_global: False
  category_7_burst: False
  category_8_temporal: True
